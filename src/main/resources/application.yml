server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/douyin
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
app:
  schedule:
    download-cron: "0 0 2 * * ?"
    collects-cron: "0 0 3 * * ?"
  download:
    base-path: "E:\\douyin"
    cookie: ""
  retry:
    max-attempts: 3
