server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/douyin
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 60000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  task:
    execution:
      pool:
        core-size: 8         # 核心线程数（默认 8）
        max-size: 32         # 最大线程数（默认 Integer.MAX_VALUE）
        queue-capacity: 500  # 队列容量（默认 Integer.MAX_VALUE）
        keep-alive: 60s      # 空闲线程存活时间
      shutdown:
        await-termination: true # 关闭应用时是否等待未完成的任务
        await-termination-period: 30s
  threads:
    virtual:
      enabled: true
